security:
    role_hierarchy:
        ROLE_MODERATOR: ROLE_USER
        ROLE_ADMIN: [ROLE_MODERATOR, ROLE_USER]

    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 13

    role_hierarchy:
        ROLE_ADMIN: [ROLE_MODERATOR]
        ROLE_MODERATOR: [ROLE_USER]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            stateless: false
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            custom_authenticators:
                - App\Security\GoogleAuthenticator
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                csrf_parameter: _csrf_token
                csrf_token_id: authenticate
                default_target_path: /
                always_use_default_target_path: false
                use_referer: true
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000
                name: REMEMBERME
                secure: true
                httponly: true
                samesite: lax
                always_remember_me: false
                remember_me_parameter: _remember_me
            logout:
                path: app_logout
                target: app_login
                invalidate_session: true
                csrf_parameter: _csrf_token
                csrf_token_id: logout

    access_control:
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/inscription, roles: PUBLIC_ACCESS }
        - { path: ^/auth/google, roles: PUBLIC_ACCESS }
        - { path: ^/politique-de-confidentialite, roles: PUBLIC_ACCESS }
        - { path: ^/moderation, roles: ROLE_MODERATOR }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/livre/, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: IS_AUTHENTICATED_REMEMBERED }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: false
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
                    delay: 1000
            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: failed

        routing:
            'App\Messenger\Message\NotificationMessage': async
            'App\Messenger\Message\BookFollowJob': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'

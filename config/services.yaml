# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    covers_upload_dir: '%kernel.project_dir%/public/uploads/covers'
    app.forum_url: ''
    app.legal.last_updated: "3 juin 2026"

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\CoverImageProcessor:
        arguments:
            $uploadsDir: '%covers_upload_dir%'

    App\Controller\DashboardController:
        arguments:
            $forumUrl: '%app.forum_url%'

    App\Controller\LegalController:
        arguments:
            $legalLastUpdated: '%app.legal.last_updated%'

    App\Service\ContactMailerService:
        arguments:
            $contactEmailFrom: '%env(CONTACT_EMAIL_FROM)%'
            $contactEmailTo: '%env(CONTACT_EMAIL_TO)%'

    App\Service\Normalizer\BookNormalizer:
        tags:
            - { name: app.entity_normalizer, key: BOOK }

    App\Service\Normalizer\ContributorNormalizer:
        tags:
            - { name: app.entity_normalizer, key: AUTHOR }
            - { name: app.entity_normalizer, key: ILLUSTRATOR }
            - { name: app.entity_normalizer, key: TRADUCTOR }

    App\Service\Normalizer\EditorNormalizer:
        tags:
            - { name: app.entity_normalizer, key: EDITOR }

    App\Service\Normalizer\CollectionNormalizer:
        tags:
            - { name: app.entity_normalizer, key: COLLECTION }

    App\Service\DiffService:
        arguments:
            $normalizers: !tagged_locator { tag: app.entity_normalizer, index_by: key }
